[project]
name = "anamnesis"
version = "0.1.0"
description = "SDK for capturing, distilling, and reusing reasoning-model thinking-tokens with conformal guarantees and signed receipts"
readme = "../README.md"
requires-python = ">=3.11"
authors = [{name = "Ozan Küsmez", email = "ozanks20@gmail.com"}]
license = {text = "Proprietary"}
dependencies = [
    "pydantic>=2.7",
    "httpx>=0.27",
    "pynacl>=1.5",
    "numpy>=1.26",
    "chromadb>=0.5",
    "anthropic>=0.40",
    "openai>=1.50",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5.0",
    "ruff>=0.5",
    "mypy>=1.10",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/anamnesis"]
